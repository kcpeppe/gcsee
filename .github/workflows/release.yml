name: Release to Maven Central

# Triggered manually — enter the release version (e.g. 0.1.0) and the next
# development version (e.g. 0.2.0-SNAPSHOT) when prompted.
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
      next_version:
        description: 'Next development version (e.g. 0.2.0-SNAPSHOT)'
        required: true
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push tag + create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # JReleaser needs full history for changelog

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # Write ~/.m2/settings.xml with the Sonatype Central server credentials.
      # This keeps credentials out of the pom.xml entirely.
      # The server id must match the one referenced in the pom.xml deploy config.
      # -----------------------------------------------------------------------
      - name: Write Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<SETTINGS
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.MAVENCENTRAL_USERNAME }}</username>
                <password>${{ secrets.MAVENCENTRAL_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      # -----------------------------------------------------------------------
      # Step 1: Set the release version in all pom.xml files
      # -----------------------------------------------------------------------
      - name: Set release version
        run: ./mvnw -B versions:set -DnewVersion=${{ github.event.inputs.release_version }} -DgenerateBackupPoms=false

      - name: Commit release version
        run: |
          git add -A
          git commit -m "Release ${{ github.event.inputs.release_version }}"

      # -----------------------------------------------------------------------
      # Step 2: Build and stage artifacts to target/staging-deploy
      # GPG signing is skipped here — JReleaser handles signing in the next step
      # -----------------------------------------------------------------------
      - name: Build and stage artifacts
        run: ./mvnw -B -Prelease deploy -Dgpg.skip=true

      # -----------------------------------------------------------------------
      # Step 3: Run JReleaser — creates GitHub Release + signs + publishes to Maven Central
      # -----------------------------------------------------------------------
      - name: JReleaser full-release
        run: ./mvnw -B -Pjreleaser jreleaser:full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}

      # -----------------------------------------------------------------------
      # Step 4: Bump to next development version and push
      # -----------------------------------------------------------------------
      - name: Set next development version
        run: ./mvnw -B versions:set -DnewVersion=${{ github.event.inputs.next_version }} -DgenerateBackupPoms=false

      - name: Commit and push next version
        run: |
          git add -A
          git commit -m "Prepare next development version ${{ github.event.inputs.next_version }}"
          git push origin main

      # -----------------------------------------------------------------------
      # Upload JReleaser output on failure for debugging
      # -----------------------------------------------------------------------
      - name: Upload JReleaser output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties